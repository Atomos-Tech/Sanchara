server {
    # Cloud Run forwards traffic to port 8080 by default
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers (OWASP Hardening) ──────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(*), camera=(), microphone=(), payment=()" always;
    # Strict Transport Security: tell browsers to always use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ─────────────────────────────────────────────────────────────────────────

    # Gzip Compression settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    location / {
        # First attempt to serve request as file, then
        # as directory, then fall back to redirecting to index.html
        # This is essential for React Router SPA behavior
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML shell — it must always be fresh for Service Worker updates
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Re-declare security headers for this specific location block
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Never cache the Service Worker — stale SW = stale app for all users
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache hashed static assets aggressively (1 year) — filenames change on deploy
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
